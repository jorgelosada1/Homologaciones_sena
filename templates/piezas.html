{% extends "layout.html" %}
{% block content %}

<style>
    .piezas-page {
        animation: fadeIn 0.5s ease;
    }

    .piezas-header {
        margin-bottom: 28px;
    }

    .piezas-header p {
        color: var(--text-muted);
        font-size: 14px;
        margin-top: -20px;
    }

    .piezas-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
    }

    .pieza-card {
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-glass);
        border-radius: var(--radius);
        overflow: hidden;
        transition: var(--transition);
        animation: slideUp 0.5s ease both;
        cursor: pointer;
    }

    .pieza-card:hover {
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-6px);
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.3);
    }

    .pieza-img-wrap {
        position: relative;
        overflow: hidden;
        aspect-ratio: 1;
    }

    .pieza-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease;
    }

    .pieza-card:hover .pieza-img-wrap img {
        transform: scale(1.08);
    }

    .pieza-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent 40%, rgba(0, 0, 0, 0.7));
        opacity: 0;
        transition: opacity 0.3s ease;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 20px;
    }

    .pieza-card:hover .pieza-overlay {
        opacity: 1;
    }

    .pieza-overlay-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        color: #1f2937;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 10px;
    }

    .pieza-actions {
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .pieza-name {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .btn-download {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: white;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        transition: var(--transition);
        cursor: pointer;
    }

    .btn-download:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* Stagger */
    .pieza-card:nth-child(1) {
        animation-delay: 0.05s;
    }

    .pieza-card:nth-child(2) {
        animation-delay: 0.1s;
    }

    .pieza-card:nth-child(3) {
        animation-delay: 0.15s;
    }

    .pieza-card:nth-child(4) {
        animation-delay: 0.2s;
    }

    .pieza-card:nth-child(5) {
        animation-delay: 0.25s;
    }

    .pieza-card:nth-child(6) {
        animation-delay: 0.3s;
    }

    /* Lightbox */
    .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(8px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9000;
        cursor: pointer;
    }

    .lightbox img {
        max-width: 90vw;
        max-height: 85vh;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        animation: scaleIn 0.3s ease;
    }

    .lightbox-close {
        position: absolute;
        top: 20px;
        right: 24px;
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
    }

    .lightbox-close:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 540px) {
        .piezas-grid {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
    }
</style>

<div class="piezas-page">
    <div class="piezas-header">
        <h2><i class="fa-solid fa-images" style="color:var(--accent-purple)"></i> Piezas Gráficas</h2>
        <p>Material gráfico disponible para campañas y promociones</p>
    </div>

    <div class="piezas-grid">
        {% for img in imagenes %}
        <div class="pieza-card" onclick="abrirLightbox('{{ url_for('static', filename='piezas/' + img) }}')">
            <div class="pieza-img-wrap">
                <img src="{{ url_for('static', filename='piezas/' + img) }}" alt="{{ img }}" loading="lazy">
                <div class="pieza-overlay">
                    <span class="pieza-overlay-btn"><i class="fa-solid fa-expand"></i> Ver</span>
                </div>
            </div>
            <div class="pieza-actions">
                <span class="pieza-name">{{ img }}</span>
                <a href="{{ url_for('static', filename='piezas/' + img) }}" download class="btn-download"
                    onclick="event.stopPropagation()">
                    <i class="fa-solid fa-download"></i> Descargar
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="cerrarLightbox(event)">
    <button class="lightbox-close" onclick="cerrarLightbox()"><i class="fa-solid fa-xmark"></i></button>
    <img id="lightbox-img" src="" alt="Preview">
</div>

<script>
    function abrirLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function cerrarLightbox(e) {
        if (!e || e.target.id === 'lightbox' || e.target.closest('.lightbox-close')) {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = '';
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') cerrarLightbox();
    });
</script>

{% endblock %}
