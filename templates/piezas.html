{% extends "layout.html" %}
{% block content %}

<style>
/* ===== VARIABLES LIGHT ===== */
:root {
    --green-main: #22c55e;
    --green-dark: #16a34a;

    --bg-page: #f8fafc;
    --card-bg: #ffffff;

    --text-main: #1f2937;
    --border-soft: #e5e7eb;
    --shadow-soft: rgba(0,0,0,0.08);
}

/* ===== VARIABLES DARK ===== */
body.dark {
    --bg-page: #0f172a;
    --card-bg: #020617;

    --text-main: #e5e7eb;
    --border-soft: #1e293b;
    --shadow-soft: rgba(0,0,0,0.4);
}

/* ===== BASE ===== */
.page-wrapper {
    background: var(--bg-page);
    padding: 40px 20px;
    transition: background .3s;
}

h2 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 28px;
    color: var(--text-main);
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
}

/* ===== CARD ===== */
.card {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 16px;
    box-shadow: 0 10px 25px var(--shadow-soft);
    text-align: center;
    transition: transform .15s ease, box-shadow .15s ease, background .3s;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 18px 35px var(--shadow-soft);
}

.card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 14px;
    object-fit: cover;
}

/* ===== ACTIONS ===== */
.actions a {
    display: inline-block;
    background: linear-gradient(135deg, var(--green-main), var(--green-dark));
    color: white;
    padding: 9px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    transition: transform .15s ease, box-shadow .15s ease;
}

.actions a:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(34,197,94,0.35);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    h2 {
        text-align: center;
    }
}
</style>

<div class="page-wrapper">

    <h2>🧩 Piezas Gráficas</h2>

    <div class="grid">
        {% for img in imagenes %}
        <div class="card">
            <img src="{{ url_for('static', filename='piezas/' + img) }}" alt="pieza gráfica">
            <div class="actions">
                <a href="{{ url_for('static', filename='piezas/' + img) }}" download>
                    ⬇ Descargar
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
