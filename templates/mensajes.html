{% extends "layout.html" %}
{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* ===== VARIABLES ===== */
:root {
    --green: #2ecb0f;
    --green-soft: rgba(46,203,15,0.12);

    --bg-page: #f9fafb;
    --bg-card: #ffffff;
    --bg-card-soft: #fbfbfb;

    --text-main: #111827;
    --text-soft: #374151;

    --border: #e5e7eb;
    --input-bg: #ffffff;
}

/* ===== DARK MODE ===== */
body.dark {
    --bg-page: #0f172a;
    --bg-card: #020617;
    --bg-card-soft: #020617;

    --text-main: #f9fafb;
    --text-soft: #cbd5f5;

    --border: #1e293b;
    --input-bg: #020617;
}

* { box-sizing: border-box; }

.page {
    display: flex;
    justify-content: center;
    padding: 50px 20px;
    font-family: 'Inter', sans-serif;
    background: var(--bg-page);
    transition: background .3s;
}

.card {
    width: 100%;
    max-width: 1100px;
    background: var(--bg-card);
    padding: 45px;
    border-radius: 22px;
    border: 1px solid var(--border);
    transition: background .3s, border .3s;
}

/* ===== HEADER ===== */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
}

.top-bar h2 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-main);
}

/* ===== CONTROLES ===== */
.controls {
    display: flex;
    gap: 12px;
    align-items: center;
}

select {
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 14px;
    cursor: pointer;
}

/* ===== TOGGLE ===== */
.toggle {
    border: 1px solid var(--border);
    background: var(--input-bg);
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-main);
}

/* ===== SEARCH ===== */
#buscador {
    width: 100%;
    padding: 15px 18px;
    border-radius: 14px;
    border: 1px solid var(--border);
    font-size: 15px;
    margin-bottom: 40px;
    background: var(--input-bg);
    color: var(--text-main);
}

#buscador:focus {
    outline: none;
    border-color: var(--green);
}

/* ===== GRID ===== */
.msg-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
}

/* ===== MENSAJE ===== */
.msg-card {
    padding: 26px 28px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-card), var(--bg-card-soft));
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    transition: background .3s, border .3s;
}

.msg-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, transparent, var(--green-soft));
    opacity: 0.6;
    pointer-events: none;
}

.msg-card h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 12px;
    z-index: 1;
}

.msg-text {
    white-space: pre-wrap;
    font-size: 14.6px;
    line-height: 1.65;
    color: var(--text-soft);
    margin-bottom: 22px;
    z-index: 1;
}

/* ===== BUTTON ===== */
.copy-btn {
    align-self: flex-end;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    z-index: 1;
    transition: transform .15s, opacity .15s;
}

.copy-btn:active {
    transform: scale(.95);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .msg-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="page">
    <div class="card">

        <!-- HEADER -->
        <div class="top-bar">
            <h2>Mensajes Comerciales</h2>

            <div class="controls">
                <form method="get">
                    <select name="nivel" onchange="this.form.submit()">
                        <option value="pre" {% if filtro == "pre" %}selected{% endif %}>Pregrados</option>
                        <option value="pos" {% if filtro == "pos" %}selected{% endif %}>Posgrados</option>
                    </select>
                </form>

            
            </div>
        </div>

        <!-- BUSCADOR -->
        <input
            type="text"
            id="buscador"
            placeholder="Buscar mensaje"
            onkeyup="filtrar()"
        >

        <!-- MENSAJES -->
        <div class="msg-grid">
            {% for m in mensajes %}
            <div class="msg-card mensaje">
                <h3>{{ m.titulo }}</h3>
                <div class="msg-text" id="m{{ loop.index }}">
{{ m.texto }}
                </div>
                <button class="copy-btn" onclick="copiar('m{{ loop.index }}', this)">
                    Copiar
                </button>
            </div>
            {% endfor %}
        </div>

    </div>
</div>

<script>
/* ===== COPIAR ===== */
function copiar(id, btn){
    let texto = document.getElementById(id).textContent
        .replace(/\n/g, '\n\n')
        .trim();

    navigator.clipboard.writeText(texto);

    const original = btn.innerText;
    btn.innerText = "✓ Copiado";
    setTimeout(() => btn.innerText = original, 1200);
}

/* ===== FILTRAR ===== */
function filtrar(){
    const texto = document.getElementById("buscador").value.toLowerCase();
    document.querySelectorAll(".mensaje").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(texto)
            ? "flex"
            : "none";
    });
}

/* ===== TEMA ===== */
function toggleTheme(){
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
}

if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark");
}
</script>

{% endblock %}
