{% extends "layout.html" %}
{% block content %}

<style>
    .sena-page {
        max-width: 800px;
        margin: 0 auto;
        animation: fadeIn 0.5s ease;
    }

    .sena-header {
        margin-bottom: 24px;
    }

    .sena-header p {
        color: var(--text-muted);
        font-size: 14px;
        margin-top: -20px;
    }

    /* Search */
    .search-form {
        position: relative;
        margin-bottom: 28px;
    }

    .search-form i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
    }

    .search-form input {
        padding-left: 44px;
        height: 52px;
        border-radius: 14px;
        font-size: 15px;
        background: var(--bg-card);
        border: 1px solid var(--border-glass);
    }

    .search-form button {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        height: 40px;
        padding: 0 18px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    /* Card */
    .sena-card {
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-glass);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 16px;
        transition: var(--transition);
        animation: slideUp 0.5s ease both;
        position: relative;
        overflow: hidden;
    }

    .sena-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, var(--accent), #059669);
    }

    .sena-card:hover {
        border-color: rgba(255, 255, 255, 0.12);
        transform: translateX(4px);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }

    .sena-card h3 {
        font-size: 16px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .sena-card h3::before {
        content: '🎓';
    }

    .sena-body {
        white-space: pre-wrap;
        font-size: 14px;
        line-height: 1.7;
        color: var(--text-secondary);
        margin-bottom: 16px;
        padding-left: 8px;
    }

    .btn-copy-sena {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #059669, #047857);
        color: white;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 3px 12px rgba(5, 150, 105, 0.25);
    }

    .btn-copy-sena:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(5, 150, 105, 0.35);
    }

    .sena-card:nth-child(1) {
        animation-delay: 0.05s;
    }

    .sena-card:nth-child(2) {
        animation-delay: 0.1s;
    }

    .sena-card:nth-child(3) {
        animation-delay: 0.15s;
    }

    .sena-card:nth-child(4) {
        animation-delay: 0.2s;
    }

    .sena-card:nth-child(5) {
        animation-delay: 0.25s;
    }

    .no-results {
        text-align: center;
        padding: 40px;
        color: var(--text-muted);
    }
</style>

<div class="sena-page">
    <div class="sena-header">
        <h2><i class="fa-solid fa-graduation-cap" style="color:var(--accent)"></i> Mensajes SENA</h2>
        <p>Mensajes con beneficios de homologación para egresados SENA</p>
    </div>

    <form method="get" class="search-form">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" name="q" placeholder="Buscar programa SENA..." value="{{ q }}">
        <button type="submit"><i class="fa-solid fa-search"></i> Buscar</button>
    </form>

    {% if mensajes %}
    <div id="listaSena">
        {% for m in mensajes %}
        <div class="sena-card">
            <h3>{{ m.titulo }}</h3>
            <div class="sena-body" id="s{{ loop.index }}">{{ m.texto }}</div>
            <button type="button" class="btn-copy-sena"
                onclick="copiarTexto('s{{ loop.index }}', '¡Mensaje SENA copiado!')">
                <i class="fa-solid fa-copy"></i> Copiar
            </button>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="no-results">
        <i class="fa-solid fa-inbox" style="font-size:36px;display:block;margin-bottom:12px"></i>
        <p>No se encontraron mensajes SENA</p>
    </div>
    {% endif %}
</div>

{% endblock %}
