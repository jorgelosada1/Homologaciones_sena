{% extends "layout.html" %}
{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

/* =========================
   VARIABLES BASE
========================= */
:root {
    --green-main: #22c55e;
    --green-dark: #16a34a;
    --green-soft: #dcfce7;

    --bg-main: #f0fdf4;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-soft: #4b5563;
    --border-soft: #e5e7eb;
}

/* =========================
   MODO OSCURO
   (hereda de layout.html)
========================= */
body.dark {
    --bg-main: #0f172a;
    --card-bg: #020617;
    --text-main: #e5e7eb;
    --text-soft: #9ca3af;
    --border-soft: #1e293b;
    --green-soft: rgba(34,197,94,0.15);
}

/* =========================
   BASE
========================= */
.page {
    display: flex;
    justify-content: center;
    padding: 60px 20px;
    font-family: 'Inter', sans-serif;
}

.card {
    width: 100%;
    max-width: 560px;
    background: var(--card-bg);
    border-radius: 22px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    overflow: hidden;
    color: var(--text-main);
}

/* =========================
   HEADER
========================= */
.card-header {
    background: linear-gradient(135deg, var(--green-main), var(--green-dark));
    padding: 26px 30px;
    color: white;
}

.card-header h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
}

.card-header p {
    margin: 4px 0 0;
    font-size: 14px;
    opacity: 0.95;
}

/* =========================
   BODY
========================= */
.card-body {
    padding: 32px;
}

label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 6px;
    display: block;
}

input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid var(--border-soft);
    font-size: 15px;
    background: transparent;
    color: var(--text-main);
}

input:focus {
    outline: none;
    border-color: var(--green-main);
    box-shadow: 0 0 0 4px rgba(34,197,94,0.25);
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, var(--green-main), var(--green-dark));
    color: white;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(34,197,94,0.35);
}

/* =========================
   RESULTADO
========================= */
.resultado {
    margin-top: 36px;
    border-top: 1px solid var(--border-soft);
    padding-top: 26px;
}

.bubble {
    background: var(--green-soft);
    padding: 22px;
    border-radius: 18px;
    font-size: 14.8px;
    line-height: 1.6;
    color: var(--text-main);
    border-left: 5px solid var(--green-main);
    white-space: pre-wrap;
}

/* =========================
   BOTÓN COPIAR
========================= */
.copy {
    background: transparent;
    color: var(--green-main);
    border: 2px solid var(--green-main);
    margin-top: 14px;
    transition: all 0.25s ease;
}

.copy.success {
    background: var(--green-main);
    color: white;
    border-color: var(--green-main);
}
</style>

<div class="page">
    <div class="card">

        <div class="card-header">
            <h2>Homologaciones SENA</h2>
            <p>Generador automático de mensajes académicos</p>
        </div>

        <div class="card-body">
            <form method="POST">
                <label>Título obtenido en el SENA</label>
                <input list="titulos" name="titulo" required>

                <datalist id="titulos">
                    {% for t in titulos %}
                    <option value="{{ t }}">
                    {% endfor %}
                </datalist>

                <button type="submit">Generar mensaje</button>
            </form>

            {% if mensaje %}
            <div class="resultado">
                <div class="bubble" id="msg">{{ mensaje }}</div>

                <button class="copy" id="btnCopy" onclick="copiar()">
                    <span id="copyText">Copiar mensaje</span>
                </button>
            </div>

            <script>
            function copiar() {
                const msg = document.getElementById("msg");
                const btn = document.getElementById("btnCopy");
                const text = document.getElementById("copyText");

                let contenido = msg.textContent
                    .replace(/\r\n/g, '\n')
                    .replace(/\n{1,}/g, '\n\n')
                    .trim();

                navigator.clipboard.writeText(contenido);

                btn.classList.add("success");
                text.textContent = "✓ Copiado";

                setTimeout(() => {
                    btn.classList.remove("success");
                    text.textContent = "Copiar mensaje";
                }, 1500);
            }
            </script>
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
