{% extends "layout.html" %}
{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

/* ===== VARIABLES LIGHT ===== */
:root {
    --green-main: #2ecb0f;
    --green-dark: #27b80d;
    --green-soft: rgba(46,203,15,0.15);

    --bg-page: #f1f5f9;
    --bg-card: #ffffff;
    --bg-pre: #f8fafc;

    --text-main: #1f2937;
    --text-soft: #475569;

    --border: #cbd5f5;
}

/* ===== VARIABLES DARK ===== */
body.dark {
    --bg-page: #0f172a;
    --bg-card: #020617;
    --bg-pre: #020617;

    --text-main: #e5e7eb;
    --text-soft: #cbd5f5;

    --border: #1e293b;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-page);
    color: var(--text-main);
    transition: background .3s, color .3s;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    background: var(--bg-card);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    transition: background .3s;
}

h2 {
    font-weight: 600;
    margin-bottom: 25px;
    font-size: 26px;
    text-align: center;
}

label {
    font-weight: 500;
    display: block;
    margin-bottom: 6px;
    color: var(--text-soft);
}

input,
select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-family: 'Poppins';
    font-size: 14px;
    margin-bottom: 18px;
    background: transparent;
    color: var(--text-main);
}

input::placeholder {
    color: var(--text-soft);
}

input:focus,
select:focus {
    outline: none;
    border-color: var(--green-main);
}

button {
    width: 100%;
    background: linear-gradient(90deg, var(--green-main), var(--green-dark));
    border: none;
    color: white;
    padding: 14px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(46,203,15,0.35);
    transition: transform .15s ease;
}

button:hover {
    transform: translateY(-2px);
}

pre {
    margin-top: 25px;
    background: var(--bg-pre);
    padding: 20px;
    border-radius: 14px;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.6;
    border-left: 5px solid var(--green-main);
    color: var(--text-main);
}

.acciones {
    margin-top: 15px;
    text-align: right;
}

.btn-copiar {
    width: auto;
    padding: 10px 16px;
    font-size: 14px;
    border-radius: 10px;
    background: transparent;
    color: var(--green-main);
    border: 2px solid var(--green-main);
    box-shadow: none;
    transition: all .2s ease;
}

.btn-copiar:hover {
    background: var(--green-main);
    color: white;
}

.btn-copiar i {
    margin-right: 6px;
}

.logo {
    text-align: center;
    margin-bottom: 20px;
}

.logo i {
    font-size: 40px;
    color: var(--green-main);
}
</style>

<div class="container">

    <div class="logo">
        <i class="fa-solid fa-school"></i>
    </div>

    <h2>Homologaciones Presenciales</h2>

    <form method="POST">
        <label>Título SENA</label>
        <input list="titulos" name="titulo" required placeholder="Escribe tu título SENA">

        <datalist id="titulos">
            {% for t in titulos %}
            <option value="{{ t }}">
            {% endfor %}
        </datalist>

        <label>Sede</label>
        <select name="sede" required>
            <option value="">Selecciona una sede</option>
            <option value="bogota">Bogotá</option>
            <option value="pereira">Pereira</option>
            <option value="valledupar">Valledupar</option>
        </select>

        <button type="submit">
            <i class="fa-solid fa-magnifying-glass"></i> Consultar homologación
        </button>
    </form>

    {% if mensaje %}
    <pre id="mensaje">{{ mensaje }}</pre>

    <div class="acciones">
        <button type="button" class="btn-copiar" onclick="copiarMensaje(this)">
            <i class="fa-solid fa-copy"></i> Copiar mensaje
        </button>
    </div>
    {% endif %}

</div>

<script>
function copiarMensaje(btn) {
    const texto = document.getElementById("mensaje").textContent
        .replace(/\n/g, '\n\n')
        .trim();

    navigator.clipboard.writeText(texto);

    const original = btn.innerHTML;
    btn.innerHTML = "✓ Copiado";
    setTimeout(() => btn.innerHTML = original, 1200);
}
</script>

{% endblock %}
