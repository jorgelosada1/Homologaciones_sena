{% extends "layout.html" %}
{% block content %}

<style>
    .presencial-page {
        max-width: 700px;
        margin: 0 auto;
        animation: slideUp 0.5s ease;
    }

    .presencial-header {
        text-align: center;
        margin-bottom: 32px;
    }

    .presencial-header h2 {
        justify-content: center;
        font-size: 30px;
        margin-bottom: 8px;
    }

    .presencial-header p {
        color: var(--text-muted);
        font-size: 14px;
    }

    .presencial-card {
        background: var(--bg-card);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-glass);
        border-radius: var(--radius);
        padding: 32px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
    }

    .input-icon input,
    .input-icon select {
        padding-left: 44px;
        height: 50px;
        border-radius: 14px;
    }

    .sede-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 24px;
    }

    .sede-option {
        position: relative;
    }

    .sede-option input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
    }

    .sede-option label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px 12px;
        border-radius: 14px;
        border: 1px solid var(--border-glass);
        background: rgba(15, 23, 42, 0.4);
        cursor: pointer;
        transition: var(--transition);
        text-transform: none;
        letter-spacing: normal;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
    }

    .sede-option label i {
        font-size: 20px;
        color: var(--text-muted);
        transition: var(--transition);
    }

    .sede-option input:checked+label {
        border-color: var(--accent);
        background: rgba(34, 197, 94, 0.1);
        box-shadow: 0 0 20px var(--accent-glow);
    }

    .sede-option input:checked+label i {
        color: var(--accent);
    }

    .sede-option label:hover {
        border-color: rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.03);
    }

    .btn-consultar {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 4px 20px var(--accent-glow);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-consultar:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
    }

    .resultado-box {
        margin-top: 28px;
        animation: slideUp 0.4s ease;
    }

    .resultado-pre {
        background: rgba(15, 23, 42, 0.6);
        padding: 20px;
        border-radius: 14px;
        white-space: pre-wrap;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        line-height: 1.7;
        border-left: 4px solid var(--accent);
        color: var(--text-secondary);
        margin-bottom: 14px;
    }

    .btn-copy-resultado {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 46px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent-blue), #2563eb);
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
    }

    .btn-copy-resultado:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
    }

    @media (max-width: 480px) {
        .sede-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="presencial-page">
    <div class="presencial-header">
        <h2><i class="fa-solid fa-school" style="color:var(--accent-blue)"></i> Homologaciones Presenciales</h2>
        <p>Consulta homologaciones para modalidad presencial por sede</p>
    </div>

    <div class="presencial-card">
        <form method="POST">
            <div class="form-group">
                <label>Título SENA</label>
                <div class="input-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <input list="titulos" name="titulo" required placeholder="Escribe tu título SENA..."
                        autocomplete="off">
                </div>
                <datalist id="titulos">
                    {% for t in titulos %}
                    <option value="{{ t }}">
                        {% endfor %}
                </datalist>
            </div>

            <div class="form-group">
                <label>Selecciona tu sede</label>
                <div class="sede-grid">
                    <div class="sede-option">
                        <input type="radio" name="sede" value="bogota" id="bogota" required>
                        <label for="bogota">
                            <i class="fa-solid fa-city"></i>
                            Bogotá
                        </label>
                    </div>
                    <div class="sede-option">
                        <input type="radio" name="sede" value="pereira" id="pereira">
                        <label for="pereira">
                            <i class="fa-solid fa-mountain-sun"></i>
                            Pereira
                        </label>
                    </div>
                    <div class="sede-option">
                        <input type="radio" name="sede" value="valledupar" id="valledupar">
                        <label for="valledupar">
                            <i class="fa-solid fa-sun"></i>
                            Valledupar
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-consultar">
                <i class="fa-solid fa-magnifying-glass"></i> Consultar homologación
            </button>
        </form>

        {% if mensaje %}
        <div class="resultado-box">
            <div class="resultado-pre" id="mensaje">{{ mensaje }}</div>
            <button type="button" class="btn-copy-resultado" onclick="copiarTexto('mensaje', '¡Mensaje copiado!')">
                <i class="fa-solid fa-copy"></i> Copiar mensaje
            </button>
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
