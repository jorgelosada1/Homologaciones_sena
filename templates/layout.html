<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homologaciones SENA – Areandina</title>
    <meta name="description"
        content="Sistema de homologaciones SENA para la Universidad Areandina. Consulta programas, precios y beneficios.">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="{{ url_for('logo') }}">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-solid: #1e293b;
            --bg-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #22c55e;
            --accent-dark: #16a34a;
            --accent-glow: rgba(34, 197, 94, 0.25);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --danger: #ef4444;
            --sidebar-width: 270px;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            /* Changed from min-height to allow scrolling */
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            padding: 28px 18px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            overflow-y: auto;
            /* Fix sidebar cutoff */
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            padding: 0 8px;
            color: var(--text-primary);
        }

        .brand i {
            font-size: 28px;
            color: var(--accent);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 8px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ===== MENU ===== */
        .menu-section {
            margin-bottom: 8px;
        }

        .menu-title {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 20px 12px 10px;
            font-weight: 600;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text-secondary);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 4px;
            font-size: 13.5px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .menu a i {
            font-size: 16px;
            width: 22px;
            text-align: center;
            transition: var(--transition);
        }

        .menu a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .menu a:hover i {
            color: var(--accent);
        }

        .menu a.active {
            color: var(--text-primary);
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .menu a.active i {
            color: var(--accent);
            filter: drop-shadow(0 0 6px var(--accent-glow));
        }

        .menu a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .menu-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-glass), transparent);
            margin: 16px 10px;
        }

        /* ===== MOBILE TOGGLE ===== */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .mobile-toggle:hover {
            background: rgba(34, 197, 94, 0.15);
            border-color: var(--accent);
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 40px;
            min-height: 100vh;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== COMMON ELEMENTS ===== */
        h2 {
            font-weight: 700;
            margin-bottom: 28px;
            font-size: 28px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2 .icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        h3 {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* ===== INPUTS ===== */
        input,
        select,
        textarea {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-glass);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-primary);
            transition: var(--transition);
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-copy {
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
        }

        button {
            font-family: 'Inter', sans-serif;
            cursor: pointer;
        }

        /* ===== PRE ===== */
        pre {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: var(--radius);
            white-space: pre-wrap;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            border-left: 4px solid var(--accent);
            color: var(--text-secondary);
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            text-align: left;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-glass);
            color: var(--text-primary);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 280px;
        }

        .toast.success {
            border-left: 4px solid var(--accent);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.info {
            border-left: 4px solid var(--accent-blue);
        }

        .toast.hiding {
            animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(50px);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.open {
                display: block;
            }

            .mobile-toggle {
                display: flex;
            }

            .content {
                margin-left: 0;
                padding: 24px 16px;
                padding-top: 70px;
            }

            h2 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .content {
                padding: 16px 12px;
                padding-top: 70px;
            }
        }
    </style>
</head>

<body>

    <!-- MOBILE TOGGLE -->
    <button class="mobile-toggle" onclick="toggleSidebar()" id="mobileToggle">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            Areandina
        </div>
        <div class="brand-sub">Sistema de Homologaciones</div>

        <div class="menu">

            <div class="menu-section">
                <div class="menu-title">Principal</div>

                <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                    <i class="fa-solid fa-building-columns"></i>
                    Homologaciones
                </a>

                <a href="/presencial" class="{% if request.path == '/presencial' %}active{% endif %}">
                    <i class="fa-solid fa-school"></i>
                    Presencial
                </a>

                <a href="/precios" class="{% if request.path == '/precios' %}active{% endif %}">
                    <i class="fa-solid fa-tags"></i>
                    Precios Pregrado
                </a>
            </div>

            <div class="menu-divider"></div>

            <div class="menu-section">
                <div class="menu-title">Mensajería</div>

                <a href="/mensajes" class="{% if request.path == '/mensajes' %}active{% endif %}">
                    <i class="fa-solid fa-comments"></i>
                    Mensajes Comerciales
                </a>

                <a href="/sena" class="{% if request.path == '/sena' %}active{% endif %}">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Mensajes SENA
                </a>

                <a href="/parametrizacion" class="{% if request.path == '/parametrizacion' %}active{% endif %}">
                    <i class="fa-solid fa-calendar-days"></i>
                    Parametrización
                </a>

                <a href="/whatsapp" class="{% if request.path == '/whatsapp' %}active{% endif %}">
                    <i class="fa-brands fa-whatsapp"></i>
                    WhatsApp Masivo
                </a>
            </div>

            <div class="menu-divider"></div>

            <div class="menu-section">
                <div class="menu-title">Gestión</div>

                <a href="/piezas" class="{% if request.path == '/piezas' %}active{% endif %}">
                    <i class="fa-solid fa-images"></i>
                    Piezas Gráficas
                </a>

                <a href="/stats" class="{% if request.path == '/stats' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie"></i>
                    Estadísticas
                </a>

                <a href="/aguachica" class="{% if '/aguachica' in request.path %}active{% endif %}">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard Aguachica
                </a>
            </div>

        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ===== SIDEBAR TOGGLE =====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        // ===== TOAST SYSTEM =====
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icons = {
                success: 'fa-circle-check',
                error: 'fa-circle-xmark',
                info: 'fa-circle-info'
            };

            toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.success}"></i> ${message}`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // ===== GLOBAL COPY =====
        function copiarTexto(id, label) {
            const el = document.getElementById(id);
            if (!el) return;
            navigator.clipboard.writeText(el.innerText).then(() => {
                showToast(label || 'Mensaje copiado al portapapeles');
            });
        }

        // Close sidebar on link click (mobile)
        document.querySelectorAll('.menu a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    toggleSidebar();
                }
            });
        });
    </script>
</body>

</html>
