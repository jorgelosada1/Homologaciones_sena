<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Homologaciones SENA</title>

    <link rel="icon" type="image/jpeg" href="{{ url_for('logo') }}">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            /* ===== LIGHT MODE ===== */
            --bg-main: #f0fdf4;
            --bg-sidebar: #dcfce7;
            --bg-card: #ffffff;

            --text-main: #064e3b;
            --text-muted: #065f46;

            --green: #22c55e;
            --green-dark: #16a34a;

            --border: #bbf7d0;
        }

        body.dark {
            /* ===== DARK MODE ===== */
            --bg-main: #020617;
            --bg-sidebar: #020617;
            --bg-card: #0f172a;

            --text-main: #e5e7eb;
            --text-muted: #94a3b8;

            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            transition: background .3s, color .3s;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 270px;
            min-height: 100vh;
            background: var(--bg-sidebar);
            padding: 26px 22px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background .3s;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 36px;
        }

        .brand i {
            color: var(--green);
            font-size: 26px;
        }

        /* ===== MENU ===== */
        .menu-title {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 14px 10px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: .25s;
        }

        .menu a i {
            width: 22px;
            text-align: center;
            font-size: 15px;
            color: var(--text-muted);
        }

        .menu a:hover {
            background: rgba(34,197,94,.15);
        }

        .menu a.active {
            background: linear-gradient(
                90deg,
                rgba(34,197,94,.25),
                rgba(34,197,94,.05)
            );
            border-left: 4px solid var(--green);
            color: var(--green-dark);
        }

        .menu a.active i {
            color: var(--green);
        }

        .menu-divider {
            height: 1px;
            background: var(--border);
            margin: 18px 10px;
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            padding: 38px;
        }

        /* ===== BUTTON THEME ===== */
        .theme-btn {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(34,197,94,.15);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: .25s;
        }

        .theme-btn:hover {
            background: rgba(34,197,94,.25);
        }

        /* ===== FORM ===== */
        input, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(90deg, var(--green), var(--green-dark));
            transition: .25s;
        }

        button:hover {
            box-shadow: 0 10px 25px rgba(34,197,94,.35);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            Areandina
        </div>

        <div class="menu">

            <div class="menu-title">Principal</div>

            <a href="/" class="{% if request.path == '/' %}active{% endif %}">
                <i class="fa-solid fa-building-columns"></i>
                Homologaciones
            </a>

            <a href="/mensajes" class="{% if request.path == '/mensajes' %}active{% endif %}">
                <i class="fa-solid fa-comments"></i>
                Mensajes
            </a>

            <a href="/sena" class="{% if request.path == '/sena' %}active{% endif %}">
                <i class="fa-solid fa-graduation-cap"></i>
                Mensajes SENA
            </a>

            <a href="/presencial" class="{% if request.path == '/presencial' %}active{% endif %}">
                <i class="fa-solid fa-school"></i>
                Presencial
            </a>

            <div class="menu-divider"></div>

            <div class="menu-title">Gestión</div>

            <a href="/piezas" class="{% if request.path == '/piezas' %}active{% endif %}">
                <i class="fa-solid fa-puzzle-piece"></i>
                Piezas
            </a>

            <a href="/aguachica" class="{% if request.path == '/aguachica' %}active{% endif %}">
                <i class="fa-solid fa-chart-line"></i>
                Aguachica
            </a>
        </div>

        <!-- BOTÓN TEMA -->
        <button id="toggleTheme" class="theme-btn">
            <i class="fa-solid fa-moon"></i>
            Modo oscuro
        </button>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script>
        const btn = document.getElementById('toggleTheme');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark');
            btn.innerHTML = '<i class="fa-solid fa-sun"></i> Modo claro';
        }

        btn.addEventListener('click', () => {
            body.classList.toggle('dark');
            const dark = body.classList.contains('dark');
            localStorage.setItem('theme', dark ? 'dark' : 'light');

            btn.innerHTML = dark
                ? '<i class="fa-solid fa-sun"></i> Modo claro'
                : '<i class="fa-solid fa-moon"></i> Modo oscuro';
        });
    </script>

</body>
</html>
