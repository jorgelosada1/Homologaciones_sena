{% extends "layout.html" %}
{% block content %}

<style>
    .login-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 80px);
        animation: fadeIn 0.5s ease;
    }

    .login-card {
        background: var(--bg-card);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border-glass);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        text-align: center;
        animation: scaleIn 0.5s ease;
    }

    .login-icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 28px;
        color: white;
        box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
    }

    .login-card h2 {
        justify-content: center;
        font-size: 24px;
        margin-bottom: 8px;
    }

    .login-card p {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 28px;
    }

    .login-group {
        position: relative;
        margin-bottom: 16px;
    }

    .login-group i {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
    }

    .login-group input {
        padding-left: 44px;
        height: 52px;
        border-radius: 14px;
        font-size: 15px;
    }

    .btn-login {
        width: 100%;
        height: 52px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: 0 6px 25px rgba(59, 130, 246, 0.3);
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 35px rgba(59, 130, 246, 0.4);
    }

    .login-footer {
        margin-top: 24px;
        font-size: 12px;
        color: var(--text-muted);
    }
</style>

<div class="login-page">
    <div class="login-card">
        <div class="login-icon">
            <i class="fa-solid fa-lock"></i>
        </div>

        <h2>Acceso Aguachica</h2>
        <p>Ingresa tus credenciales para acceder al dashboard</p>

        <form method="post">
            <div class="login-group">
                <i class="fa-solid fa-user"></i>
                <input name="user" placeholder="Usuario" required autocomplete="username">
            </div>
            <div class="login-group">
                <i class="fa-solid fa-key"></i>
                <input name="password" type="password" placeholder="Contraseña" required
                    autocomplete="current-password">
            </div>
            <button class="btn-login" type="submit">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Ingresar
            </button>
        </form>

        <div class="login-footer">
            <i class="fa-solid fa-shield-halved"></i> Acceso restringido — Solo personal autorizado
        </div>
    </div>
</div>

{% endblock %}
